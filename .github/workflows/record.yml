# 日米の株式売買代金ランキングを毎営業日に自動記録し、index.html を再生成してコミットする。
# - US: 平日 22:00 UTC（= 翌朝7:00 JST、米国市場クローズ後）
# - JP: 平日 07:00 UTC（= 16:00 JST、東京市場クローズ後）
# - 手動実行: workflow_dispatch（market: us / jp / both）
name: record

on:
  schedule:
    - cron: "0 22 * * 1-5"  # US
    - cron: "0 7 * * 1-5"   # JP
  workflow_dispatch:
    inputs:
      market:
        description: "記録する市場"
        type: choice
        options: [us, jp, both]
        default: both

permissions:
  contents: write

concurrency:
  group: record
  cancel-in-progress: false

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine markets
        id: mk
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            case "${{ github.event.schedule }}" in
              "0 22 * * 1-5") echo "markets=us" >> "$GITHUB_OUTPUT" ;;
              "0 7 * * 1-5")  echo "markets=jp" >> "$GITHUB_OUTPUT" ;;
              *) echo "unknown schedule"; exit 1 ;;
            esac
          else
            m="${{ github.event.inputs.market }}"
            if [ "$m" = "both" ]; then m="us jp"; fi
            echo "markets=$m" >> "$GITHUB_OUTPUT"
          fi

      - name: Record rankings
        run: |
          for m in ${{ steps.mk.outputs.markets }}; do
            python3 scripts/record.py "$m"
          done

      - name: Build HTML
        run: python3 scripts/build_html.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data index.html
          if git diff --cached --quiet; then
            echo "変更なし（記録済み・休場・スキップ）"
          else
            git commit -m "chore: 売買代金ランキング日次記録 (${{ steps.mk.outputs.markets }})"
            git pull --rebase origin main
            git push origin main
          fi
